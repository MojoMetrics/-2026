        let currentDomain = 'history';
        let currentChartInstance = null;

        function initApp() {
            switchDomain('history');
        }

        function switchDomain(domain) {
            currentDomain = domain;
            
            // Update Tab UI
            const histTab = document.getElementById('tab-history');
            const geoTab = document.getElementById('tab-geography');
            
            if(domain === 'history') {
                histTab.className = "px-6 py-2 rounded-lg font-bold transition-all duration-200 bg-history text-white shadow-md";
                geoTab.className = "px-6 py-2 rounded-lg font-bold text-stone-500 hover:text-stone-800 hover:bg-stone-200 transition-all duration-200";
            } else {
                geoTab.className = "px-6 py-2 rounded-lg font-bold transition-all duration-200 bg-geography text-white shadow-md";
                histTab.className = "px-6 py-2 rounded-lg font-bold text-stone-500 hover:text-stone-800 hover:bg-stone-200 transition-all duration-200";
            }

            // Update Intro
            document.getElementById('intro-title').textContent = appData[domain].introTitle;
            document.getElementById('intro-title').className = `text-xl font-bold mb-2 text-${domain}`;
            document.getElementById('intro-text').textContent = appData[domain].introText;

            // Render Sidebar
            renderSidebar();
            
            // Clear content area
            document.getElementById('lesson-content').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-stone-400 py-20 animate-pulse">
                    <span class="text-6xl mb-4">👈</span>
                    <p class="text-xl font-medium">الرجاء اختيار درس من القائمة الجانبية للبدء</p>
                </div>
            `;
            
            if(currentChartInstance) {
                currentChartInstance.destroy();
                currentChartInstance = null;
            }
        }

        function renderSidebar() {
            const listContainer = document.getElementById('lesson-list');
            listContainer.innerHTML = '';
            
            const activeColorClass = currentDomain === 'history' ? 'active-history' : 'active-geography';

            appData[currentDomain].lessons.forEach(lesson => {
                const btn = document.createElement('button');
                btn.className = `lesson-btn text-right w-full p-3 rounded-xl border border-stone-200 text-stone-600 hover:border-${currentDomain} hover:text-${currentDomain} transition-all duration-200 font-medium text-sm`;
                btn.textContent = lesson.title;
                btn.onclick = () => {
                    // Remove active class from all
                    document.querySelectorAll('.lesson-btn').forEach(b => {
                        b.classList.remove('active-history', 'active-geography');
                        b.classList.add('text-stone-600', 'border-stone-200');
                    });
                    // Add active class to clicked
                    btn.classList.remove('text-stone-600', 'border-stone-200');
                    btn.classList.add(activeColorClass);
                    
                    loadLesson(lesson.id);
                };
                listContainer.appendChild(btn);
            });
        }

        function loadLesson(lessonId) {
            const lesson = appData[currentDomain].lessons.find(l => l.id === lessonId);
            if(!lesson) return;

            const contentContainer = document.getElementById('lesson-content');
            
            let htmlContent = lesson.content;
            
            if (lesson.chart) {
                htmlContent += `
                <div class="mt-8 border-t border-stone-100 pt-8">
                    <div class="chart-container">
                        <canvas id="lessonChart"></canvas>
                    </div>
                </div>`;
            }

            contentContainer.innerHTML = htmlContent;

            // Handle Chart rendering
            if (currentChartInstance) {
                currentChartInstance.destroy();
                currentChartInstance = null;
            }

            if (lesson.chart) {
                const ctx = document.getElementById('lessonChart').getContext('2d');
                
                // Ensure default font for chart is Tajawal
                Chart.defaults.font.family = 'Tajawal';
                
                currentChartInstance = new Chart(ctx, {
                    type: lesson.chart.type,
                    data: lesson.chart.data,
                    options: lesson.chart.options
                });
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
