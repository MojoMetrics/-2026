    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            overflow-x: hidden;
        }

        /* MOJO SHOWY WATERMARK */
        .watermark-mojo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 22vw;
            font-weight: 900;
            color: rgba(15, 23, 42, 0.03); /* Very subtle but huge */
            pointer-events: none;
            z-index: -1;
            white-space: nowrap;
            letter-spacing: -1vw;
            text-transform: uppercase;
        }

        /* Chart Constraints */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 350px;
            max-height: 400px;
        }
        @media (max-width: 640px) {
            .chart-container { height: 250px; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* Tab Active States */
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active-history { background-color: #0284c7; color: white; box-shadow: 0 4px 14px rgba(2, 132, 199, 0.4); }
        .tab-btn.active-geography { background-color: #16a34a; color: white; box-shadow: 0 4px 14px rgba(22, 163, 74, 0.4); }
        .tab-btn.active-support { background: linear-gradient(45deg, #f59e0b, #e11d48, #9333ea); color: white; box-shadow: 0 4px 14px rgba(225, 29, 72, 0.4); }

        .lesson-item.active {
            background-color: #f1f5f9;
            border-right-width: 4px;
            font-weight: 700;
        }
        .lesson-item.active[data-domain="history"] { border-right-color: #0284c7; color: #0284c7; }
        .lesson-item.active[data-domain="geography"] { border-right-color: #16a34a; color: #16a34a; }
        .lesson-item.active[data-domain="support"] { border-right-color: #e11d48; color: #e11d48; }

        .fade-in { animation: fadeIn 0.4s ease-in forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        let currentDomain = '';
        let currentChartInstance = null;

        function switchDomain(domain) {
            if (currentDomain === domain) return;
            currentDomain = domain;
            
            // 1. Reset all tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn px-4 py-2 rounded-xl font-bold text-slate-600 hover:bg-white";
            });
            // 2. Activate current tab
            const activeTab = document.getElementById(`tab-${domain}`);
            activeTab.classList.remove('text-slate-600', 'hover:bg-white');
            activeTab.classList.add(`active-${domain}`);

            // 3. Update Sidebar Title
            document.getElementById('sidebar-title').innerHTML = `<span>${appData[domain].icon}</span> ${appData[domain].title}`;

            // 4. Render Lesson List
            renderSidebar();
            
            // 5. Show Welcome Message, hide content
            document.getElementById('welcome-message').classList.remove('hidden');
            document.getElementById('lesson-content-container').classList.add('hidden');
            document.getElementById('lesson-content-container').innerHTML = '';

            // Destroy any existing chart
            if (currentChartInstance) {
                currentChartInstance.destroy();
                currentChartInstance = null;
            }
        }

        function renderSidebar() {
            const list = document.getElementById('lesson-list');
            list.innerHTML = '';
            
            appData[currentDomain].lessons.forEach((lesson) => {
                const btn = document.createElement('button');
                btn.className = `lesson-item text-right w-full p-4 rounded-2xl border border-slate-200 text-slate-600 hover:bg-slate-50 transition-all font-medium text-sm shadow-sm flex items-center justify-between`;
                btn.dataset.domain = currentDomain;
                btn.innerHTML = `<span class="leading-relaxed pl-2">${lesson.title}</span> <span class="text-slate-300">»</span>`;
                
                btn.onclick = () => {
                    // Update active styling in sidebar
                    document.querySelectorAll('.lesson-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadLesson(lesson);
                };
                list.appendChild(btn);
            });
        }

        function loadLesson(lesson) {
            document.getElementById('welcome-message').classList.add('hidden');
            const container = document.getElementById('lesson-content-container');
            container.classList.remove('hidden');
            
            // Clear chart instance if exists
            if (currentChartInstance) {
                currentChartInstance.destroy();
                currentChartInstance = null;
            }

            // Inject Content with animation
            let html = `<div class="fade-in prose prose-slate max-w-none">${lesson.content}`;
            
            // If chart exists for this lesson, append canvas
            if (lesson.chart) {
                html += `<div class="mt-8 pt-6 border-t border-slate-100"><div class="chart-container"><canvas id="canvasChart"></canvas></div></div>`;
            }
            html += `</div>`;
            container.innerHTML = html;

            // Scroll to top of content on mobile
            if(window.innerWidth < 1024) {
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            // Render Chart if needed
            if (lesson.chart) {
                const ctx = document.getElementById('canvasChart').getContext('2d');
                Chart.defaults.font.family = 'Tajawal';
                currentChartInstance = new Chart(ctx, {
                    type: lesson.chart.type,
                    data: lesson.chart.data,
                    options: lesson.chart.options
                });
            }
        }

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            switchDomain('history');
        });
    </script>
